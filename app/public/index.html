<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	
	<title>Amalgamations</title>

    <script src="https://cdn.jsdelivr.net/npm/phaser@v3.88.2/dist/phaser.min.js"></script>
	<script src="/socket.io/socket.io.js"></script>
	<script src="src/main.js" type="module"></script>

	<style>
		/* body {
			background: #000000;
			margin: 0;
			padding: 0;
			background-image: url("./assets/Background/Purple-Background.png");
		} */
	    body {
			margin: 0;
			padding: 0;
			overflow: hidden;

			display: flex;
			justify-content: center;
			align-items: flex-start;
			min-height: 100vh;
		}

		body::before {
			content: '';
			position: fixed;
			inset: -200px;
			background-image: url("./assets/Background/Purple-Background.png");
			background-repeat: repeat;
			filter: blur(4px) brightness(0.6);
			animation: bgCircle 40s linear infinite;
			z-index: -1;
		}

		@keyframes bgCircle {
			0%   { transform: translate(0px, -60px); }
			25%  { transform: translate(60px, 0px); }
			50%  { transform: translate(0px, 60px); }
			75%  { transform: translate(-60px, 0px); }
			100% { transform: translate(0px, -60px); }
		}

		#game-wrapper {
			border-left: 10px solid black;
			border-right: 10px solid black;
			display: inline-block; 
			line-height: 0;   
		}
	</style>

</head>

<body>
	<div id="game-wrapper">
		<div id="game-container"></div>
	</div>
</body>

</html>
